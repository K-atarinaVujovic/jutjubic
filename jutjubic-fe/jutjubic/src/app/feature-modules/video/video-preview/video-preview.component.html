<div class="video-preview">
  <div class="thumbnail-wrapper">
    <img
      class="thumbnail"
      [src]="thumbnailUrl"
      [alt]="video.title"
    />
  </div>

  <div class="video-info">
    <span *ngIf="video.live" class="live">
      <span>🔴</span>
      <span>LIVE</span>
    </span>
    <span class="title">{{ video.title }}</span>
  </div>
</div>
